title: Peter Gundel
markdown: kramdown
domain: "peterfication.github.io"
url: "https://peterfication.github.io"
baseurl: ""

# for atom feed
author:
  name: Peter Gundel

plugins:
  - jemoji
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections_dir: all_collections
collections:
  posts:
    output: true

defaults:
  - scope:
      path: "_posts"
    values:
      layout: "post"
      permalink: /posts/:title/
exclude: ["sitemap.xml", "feed.xml", "LICENSE", "README.md"]
